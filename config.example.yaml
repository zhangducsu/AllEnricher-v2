# AllEnricher v2 configuration example
# Usage: allenricher analyze --config config.example.yaml --input genes.txt

# Input and output
input_file: null
output_dir: "./results"
background_file: null
background_mode: "annotated"  # annotated, genome, or custom

# Analysis scope
species: "hsa"
databases:
  - "GO"
  - "KEGG"
method: "hypergeometric"      # hypergeometric, gsea, ssgsea, or gsva
correction: "BH"              # BH, BY, bonferroni, holm, or none
pvalue_cutoff: 0.05
qvalue_cutoff: 0.05
min_genes: 3
max_genes: .inf
output_all: true

# GSEA, ssGSEA, and GSVA
gsea_permutations: 1000
gsea_min_size: null            # method default: GSEA 15; ssGSEA/GSVA 1
gsea_max_size: null            # method default: GSEA 500; ssGSEA/GSVA unbounded
gsva_method: "gsva"
gsva_kcdf: "Gaussian"
gsva_tau: 1.0

# Figures and reports
plot_formats:
  - "pdf"
  - "png"
plot_dpi: 300
top_terms: 20
activity_heatmap_top_n: 40
plot_width: null               # adaptive when null
plot_height: null              # adaptive when null
plot_style: "nature"          # nature, science, or presentation
plot_palette: null             # optional semantic-role palette fallback
categorical_palette: null      # for categories and groups
sequential_palette: null       # for ordered non-negative values
diverging_palette: null        # for values centered on zero
generate_report: true
report_format: "html"

# Performance
n_jobs: 1

# Database storage
database_dir: "./database"
auto_update: false

# Optional AI interpretation
ai_interpretation: false
ai_backend: "openai"
ai_backends:
  openai:
    api_key: null
    model: "gpt-4"
    enabled: true
  claude:
    api_key: null
    model: "claude-3-opus-20240229"
    enabled: true
  deepseek:
    api_key: null
    model: "deepseek-chat"
    enabled: true
  glm:
    api_key: null
    model: "glm-4"
    enabled: true
  minimax:
    api_key: null
    group_id: null
    model: "abab6.5s-chat"
    enabled: true
  ollama:
    model: "llama2"
    base_url: "http://localhost:11434"
    enabled: true
  mock:
    enabled: true
