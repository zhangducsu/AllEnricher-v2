    taxid: 7227
    latin_name: Drosophila melanogaster
    manuscript_scope: supplementary
  yeast_tsa1_deletion_stress:
    accession: E-MTAB-9355
    species: sce
    taxid: 4932
    annotation_taxid: 559292
    latin_name: Saccharomyces cerevisiae
    manuscript_scope: supplementary
methods:
  ORA:
    tools: [AllEnricher, clusterProfiler, WebGestaltR]
    go_remote_tool: g:Profiler
    min_gene_set_size: 3
    p_adjust_method: BH
    alternative: greater
    significance_threshold: 0.05
