version: 1
title: AllEnricher v2 preregistered competitor benchmark
annotation_snapshot: v20260715
input_root: ../00_input_data/real_world_sci
database_root: ../00_input_data/real_world_sci/database_snapshot
databases: [GO, KEGG]
datasets:
  human_airway_dex:
    accession: E-GEOD-52778
    species: hsa
    taxid: 9606
    latin_name: Homo sapiens
    manuscript_scope: main
  cattle_metabolic_risk_week1:
    accession: E-MTAB-5838
    species: bta
    taxid: 9913
    latin_name: Bos taurus
    manuscript_scope: main
  drosophila_fas_p218:
    accession: E-MTAB-5069
