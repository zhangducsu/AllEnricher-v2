<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">AllEnricher figure gallery preview</title>
  <desc id="desc">A compact preview of enrichment result tables, lollipop plots, GSEA curves, pathway activity heatmaps, and evidence-linked AI interpretation.</desc>
  <defs>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#2c5282"/>
    </linearGradient>
    <linearGradient id="redblue" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#b91c1c"/>
      <stop offset=".5" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1a2027" flood-opacity=".10"/>
    </filter>
  </defs>
  <rect width="1120" height="520" rx="28" fill="#f8fafc"/>
  <g filter="url(#softShadow)">
    <rect x="34" y="34" width="1052" height="452" rx="18" fill="#ffffff" stroke="#d7dde5"/>
  </g>
  <text x="64" y="80" fill="#1a2027" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">AllEnricher output at a glance</text>
  <text x="64" y="112" fill="#64748b" font-family="'Segoe UI', Arial, sans-serif" font-size="15">From species-aware databases to publication figures, auditable tables, reports, and evidence-linked AI interpretation.</text>

  <g transform="translate(64 148)">
    <rect width="220" height="278" rx="10" fill="#f8fafc" stroke="#d7dde5"/>
    <text x="18" y="34" fill="#1f2937" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700">Result table</text>
    <text x="18" y="58" fill="#64748b" font-family="'Segoe UI', Arial, sans-serif" font-size="12">IDs, names, hierarchy and genes</text>
    <g transform="translate(18 82)" font-family="'Segoe UI', Arial, sans-serif" font-size="12">
      <rect width="184" height="28" rx="4" fill="#eaf2fb"/>
      <text x="10" y="19" fill="#2c5282" font-weight="700">Term</text>
      <text x="74" y="19" fill="#2c5282" font-weight="700">FDR</text>
      <text x="130" y="19" fill="#2c5282" font-weight="700">Genes</text>
      <g fill="#334155">
        <text x="10" y="56">KEGG:R001</text><text x="80" y="56">1.2e-5</text><text x="139" y="56">18</text>
        <text x="10" y="91">GO:R004</text><text x="80" y="91">3.8e-4</text><text x="139" y="91">31</text>
        <text x="10" y="126">TF:R002</text><text x="80" y="126">8.9e-3</text><text x="139" y="126">24</text>
      </g>
      <g stroke="#e2e8f0">
        <line x1="0" y1="70" x2="184" y2="70"/>
        <line x1="0" y1="105" x2="184" y2="105"/>
        <line x1="0" y1="140" x2="184" y2="140"/>
      </g>
    </g>
  </g>

  <g transform="translate(316 148)">
    <rect width="220" height="278" rx="10" fill="#ffffff" stroke="#d7dde5"/>
    <text x="18" y="34" fill="#1f2937" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700">ORA lollipop</text>
    <text x="18" y="58" fill="#64748b" font-family="'Segoe UI', Arial, sans-serif" font-size="12">Compact enrichment strength view</text>
    <g transform="translate(28 88)" stroke-linecap="round">
      <line x1="0" y1="145" x2="160" y2="145" stroke="#cbd5e1"/>
      <g stroke="#94a3b8" stroke-width="3">
        <line x1="0" y1="24" x2="126" y2="24"/>
        <line x1="0" y1="62" x2="98" y2="62"/>
        <line x1="0" y1="100" x2="146" y2="100"/>
        <line x1="0" y1="138" x2="76" y2="138"/>
      </g>
      <circle cx="126" cy="24" r="12" fill="#2166ac"/>
      <circle cx="98" cy="62" r="9" fill="#4393c3"/>
      <circle cx="146" cy="100" r="15" fill="#b2182b"/>
      <circle cx="76" cy="138" r="7" fill="#92c5de"/>
      <g fill="#475569" font-family="'Segoe UI', Arial, sans-serif" font-size="11">
        <text x="0" y="171">EnrichFactor</text>
        <text x="132" y="171">FDR</text>
      </g>
    </g>
  </g>

  <g transform="translate(568 148)">
    <rect width="220" height="278" rx="10" fill="#ffffff" stroke="#d7dde5"/>
    <text x="18" y="34" fill="#1f2937" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700">GSEA trajectory</text>
    <text x="18" y="58" fill="#64748b" font-family="'Segoe UI', Arial, sans-serif" font-size="12">Up and down pathways stay separated</text>
    <g transform="translate(24 92)">
      <line x1="0" y1="78" x2="172" y2="78" stroke="#cbd5e1"/>
      <path d="M0 92 C28 26 58 20 86 68 S142 122 172 44" fill="none" stroke="#2c5282" stroke-width="4"/>
      <path d="M0 70 C24 118 58 130 88 86 S138 26 172 104" fill="none" stroke="#c2410c" stroke-width="4"/>
      <g stroke="#334155" stroke-width="2">
        <line x1="24" y1="138" x2="24" y2="154"/>
        <line x1="51" y1="138" x2="51" y2="154"/>
        <line x1="103" y1="138" x2="103" y2="154"/>
        <line x1="140" y1="138" x2="140" y2="154"/>
      </g>
      <text x="0" y="181" fill="#475569" font-family="'Segoe UI', Arial, sans-serif" font-size="11">Ranked genes</text>
    </g>
  </g>

  <g transform="translate(820 148)">
    <rect width="220" height="278" rx="10" fill="#ffffff" stroke="#d7dde5"/>
    <text x="18" y="34" fill="#1f2937" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700">Activity heatmap</text>
    <text x="18" y="58" fill="#64748b" font-family="'Segoe UI', Arial, sans-serif" font-size="12">Sample groups and pathway activity</text>
    <g transform="translate(28 88)">
      <g>
        <rect x="0" y="0" width="22" height="18" fill="#2c5282"/><rect x="24" y="0" width="22" height="18" fill="#2c5282"/>
        <rect x="48" y="0" width="22" height="18" fill="#c2410c"/><rect x="72" y="0" width="22" height="18" fill="#c2410c"/>
        <rect x="96" y="0" width="22" height="18" fill="#0f766e"/><rect x="120" y="0" width="22" height="18" fill="#0f766e"/>
      </g>
      <g transform="translate(0 28)">
        <rect width="22" height="22" fill="#b2182b"/><rect x="24" width="22" height="22" fill="#ef8a62"/><rect x="48" width="22" height="22" fill="#fddbc7"/><rect x="72" width="22" height="22" fill="#d1e5f0"/><rect x="96" width="22" height="22" fill="#67a9cf"/><rect x="120" width="22" height="22" fill="#2166ac"/>
        <rect y="24" width="22" height="22" fill="#ef8a62"/><rect x="24" y="24" width="22" height="22" fill="#fddbc7"/><rect x="48" y="24" width="22" height="22" fill="#d1e5f0"/><rect x="72" y="24" width="22" height="22" fill="#67a9cf"/><rect x="96" y="24" width="22" height="22" fill="#2166ac"/><rect x="120" y="24" width="22" height="22" fill="#4393c3"/>
        <rect y="48" width="22" height="22" fill="#2166ac"/><rect x="24" y="48" width="22" height="22" fill="#67a9cf"/><rect x="48" y="48" width="22" height="22" fill="#d1e5f0"/><rect x="72" y="48" width="22" height="22" fill="#fddbc7"/><rect x="96" y="48" width="22" height="22" fill="#ef8a62"/><rect x="120" y="48" width="22" height="22" fill="#b2182b"/>
        <rect y="72" width="22" height="22" fill="#4393c3"/><rect x="24" y="72" width="22" height="22" fill="#2166ac"/><rect x="48" y="72" width="22" height="22" fill="#67a9cf"/><rect x="72" y="72" width="22" height="22" fill="#d1e5f0"/><rect x="96" y="72" width="22" height="22" fill="#fddbc7"/><rect x="120" y="72" width="22" height="22" fill="#ef8a62"/>
      </g>
      <rect x="154" y="28" width="12" height="94" fill="url(#redblue)" stroke="#cbd5e1"/>
    </g>
  </g>
</svg>
